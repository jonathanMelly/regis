# regis.yml schema — auto-generated by regis-docgen, do not edit
# mandatory fields are marked in comments

targets:
  - name: ""                                  # mandatory — Unique identifier; drives auto-discovery of .env.<name>
    host: ""                                  # mandatory — SSH hostname or IP; accepts ${VAR}
    user: ""                                  # SSH login user
    port: 22                                  # SSH port (default 22); accepts ${VAR} for env-driven port
    dir: ""                                   # Remote working directory; relative dest paths anchor here
    sudo: false                               # Global sudo default for this target; overridable per cue
    dotenv: ""                                # Explicit env file path; overrides auto-discovery of .env.<name>

defaults:
  env:                                        # Base env for all local cues; overridden by Scenario.Env and cue-level env
    APP_ENV: production
    LOG_LEVEL: info

scenarios:
  <name>:
    describe: ""                              # Human-readable label shown in output
    env: {}                                   # Env vars for all cues in this scenario; overrides defaults.env, overridden by cue-level env
    post: ""                                  # Remote command (or restart:/reload: shorthand) run once if any remote cue changed
    requires: []                              # Scenario names that must complete first (alias: needs) — deduplicated
    success_when: auto                        # auto|command|service|checks — Override for run.success_when
    on_error: rollback                        # rollback|halt|continue — Override for run.on_error
    cues:
      - name: ""                              # mandatory — Unique within the scenario
        nature: binary                        # mandatory — binary|config|secret|action|generate|render|pack|service — inferred when manager: is set
        local: false                          # true = run on local machine (action only); default = run on SSH target
        # ── file upload: binary/secret = single file · config = multi-file/glob/tree · pack = glob tree with prune ──
        src: []                               # Local source path — binary/secret: single file only; config: scalar path, glob string, or YAML list
        dest: ""                              # Remote destination; folder (trailing /) when src is glob or list
        # ── action / generate ──
        shell: ""                             # Shell command to execute (canonical field; cmd: is an alias)
        env: {}                               # Environment variables for local execution (key: value map)
        # ── common remote cue fields (binary · config · secret · pack · service · render) ──
        post: ""                              # Remote command after cue, or restart:<svc> / reload:<svc> shorthand
        preserve: []                          # Remote keys never overwritten during merge (secret only)
        mode: ""                              # Remote file permissions, e.g. "600"
        if: ""                                # Boolean rule or probe — skip cue when false
        affects_release: false                # Mark remote action cue as release-affecting (default false for actions)
        changed_when: ""                      # Override change detection — defaults: binary/config/secret/render=MD5 diff, action=always changed, generate=always equal; expressions: "stdout contains X", "stdout !contains X", "stderr contains X", "exit == N", "exit != N"; or changed_when: true to force
        failed_when: ""                       # Override failure detection — defaults: action/generate=exit != 0, binary/config/secret=upload error; expressions: "exit != 0", "stdout contains ERROR", "stderr !contains OK"
        continue_on_error: false              # true = cue failure does not halt deployment (default false)
        sudo: false                           # Per-cue sudo override
        # ── pack / config / render: diff control ──
        diff_mode: binary                     # auto|text|binary — pack default: binary; config/render default: auto
        # ── pack / render folder mode ──
        prune: false                          # Delete remote files absent from local set (pack default: true — safe because tier-1 uses managed manifest; render default: false; set prune: false to disable for pack)
        local_dest: ""                        # Local path for rendered output; $ARTIFACT_PATH points here during render and fetch (render only)
        reverse: ""                           # Shell command run during fetch to transform the downloaded artifact into local source files; $ARTIFACT_PATH = downloaded path (render only)
        # ── service (manager: present infers nature: service) ──
        manager: ""                           # systemd | crontab (built-in), or any custom string (e.g. pm2); presence infers nature: service
        binary: ""                            # Binary filename relative to target.dir (service, crontab)
        service_file: ""                      # Local path to systemd unit file; uploaded to /etc/systemd/system/<name>.service when changed
        health: ""                            # Health-check command (crontab watchdog)
        commands: {}                          # Override or extend manager commands (start, stop, restart, reload, deploy, status). Template vars: {name}, {binary}, {dir}, {service_file}. Action refs: {restart}, {reload}, etc. expand to the pre-override base command
        # ── per-cue rollback (infers on_error: rollback; true/"cmd"/{shell,sudo}) ──
        rollback: ""                          # Per-cue compensation on rollback — rollback: true restores previous file state for file natures; rollback: "cmd" or {shell, sudo} runs a command for action natures; infers on_error: rollback for the scenario
    checks:                  # terminal acceptance probes; run after cues complete
      - name: <string>       # required
        nature: action       # checks are read-only action cues
        shell: <string>      # probe command
    rollback:                # actions run on remote after snapshot restore when on_error: rollback
      - name: <string>       # required
        shell: <string>      # remote command; $RELEASE_ID is available
        sudo: false

run:
  mode: sequential                            # sequential|batched|parallel — How selected targets are called
  batch_size: 0                               # Used only with mode: batched
  max_failures: 0                             # Allowed target failures before halting
  on_failure: halt                            # halt|continue — Reaction when a target fails
  success_when: auto                          # auto|command|service|checks — How success is determined
  on_error: halt                              # rollback|halt|continue — Reaction on error

release:
  enabled: true                               # Assign a release ID per deploy, archive files locally and remotely — enables rollback; false = live deploy, no history
  dir: /opt/app/.regis-releases               # Remote archive directory for rollback snapshots; default <target.dir>/.regis-releases
  local_dir: .regis-releases                  # Local directory for release manifests and rollback snapshots
  keep: 5                                     # Release snapshots to retain for rollback when --prune-releases is used (default 5)

concurrency:
  lock: true                                  # Enable deploy lock to prevent concurrent deploys
  on_locked: fail                             # wait|skip|fail — Behaviour when lock is held
  lock_wait: 30s                              # Max wait time when on_locked: wait — Go duration e.g. "30s"

pre:
  - cmd: "systemctl stop watchdog"            # runs on target via SSH before any cue
  - cmd: "curl -s https://hooks/deploy-start"  # runs on local machine (notify, build, etc.)
    local: true                             

post:
  - cmd: "systemctl start watchdog"           # runs on target via SSH after all cues succeed
  - cmd: "curl -s https://hooks/deploy-done"  # runs on local machine after deploy
    local: true                             

