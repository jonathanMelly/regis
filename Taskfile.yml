# Taskfile.yml — go-task v3
# https://taskfile.dev
#
# VERSION INJECTION NOTE:
# The ldflags below set main.version in cmd/regis/main.go.
# To enable version reporting, add to cmd/regis/main.go:
#
#   var version = "dev"
#
# and pass it to cobra via root.Version = version.

version: '3'

vars:
  EXT:
    sh: go env GOEXE
  BINARY: 'bin/regis{{.EXT}}'
  MODULE: git.disroot.org/jmy/regis
  # Resolved at runtime; falls back to "dev" when no git tags exist.
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:

  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  generate:
    run: once
    desc: Regenerate docs/regis-ai-context.md schema section from types.go
    cmds:
      - go run ./cmd/regis-docgen
    sources:
      - internal/config/types.go
    generates:
      - docs/regis-ai-context.md

  build:
    desc: Build the regis binary to bin/regis
    deps: [generate,test]
    cmds:
      - mkdir -p bin
      - go build -ldflags "-X main.version={{.VERSION}}" -o {{.BINARY}} ./cmd/regis
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY}}"

  run:
    desc: Run regis directly (pass args via CLI_ARGS)
    cmds:
      - go run -ldflags "-X main.version={{.VERSION}}" ./cmd/regis {{.CLI_ARGS}}

  test:
    desc: "Run all tests with gotestsum (install: go install gotest.tools/gotestsum@latest)"
    deps: [generate,lint]
    cmds:
      - gotestsum --format testdox ./...

  test:watch:
    desc: Run tests in watch mode with gotestsum
    cmds:
      - gotestsum --format testdox --watch ./...

  lint:
    desc: Run go vet (and staticcheck if available)
    cmds:
      - go vet ./...
      - cmd: staticcheck ./...
        ignore_error: true

  install:
    desc: Install regis binary to GOPATH/bin
    deps: [generate,test]
    cmds:
      - go install -ldflags "-X main.version={{.VERSION}}" ./cmd/regis

  clean:
    desc: Remove build artifacts (bin/ and dist/)
    cmds:
      - rm -rf bin dist

  release:
    desc: Cross-compile regis for all supported platforms into dist/
    deps: [generate,test]
    cmds:
      - mkdir -p dist
      # Linux amd64
      - GOOS=linux   GOARCH=amd64  go build -ldflags "-X main.version={{.VERSION}}" -o dist/regis-linux-amd64      ./cmd/regis
      # Linux arm64
      - GOOS=linux   GOARCH=arm64  go build -ldflags "-X main.version={{.VERSION}}" -o dist/regis-linux-arm64      ./cmd/regis
      # macOS amd64
      - GOOS=darwin  GOARCH=amd64  go build -ldflags "-X main.version={{.VERSION}}" -o dist/regis-darwin-amd64     ./cmd/regis
      # macOS arm64 (Apple Silicon)
      - GOOS=darwin  GOARCH=arm64  go build -ldflags "-X main.version={{.VERSION}}" -o dist/regis-darwin-arm64     ./cmd/regis
      # Windows amd64
      - GOOS=windows GOARCH=amd64  go build -ldflags "-X main.version={{.VERSION}}" -o dist/regis-windows-amd64.exe ./cmd/regis
